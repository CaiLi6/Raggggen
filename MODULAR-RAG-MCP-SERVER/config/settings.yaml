# Modular RAG MCP Server - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "qwen"  # Options: openai, azure, ollama, deepseek, qwen
  model: "qwen3-max-2026-01-23"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""
  api_key: "sk-43e9f700897049e1b57ab7e27d523ff6"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration (use local Ollama qwen3 embedding)
# =============================================================================
embedding:
  provider: "ollama"  # switched to local Ollama
  model: "qwen3-embedding"  # local Ollama model name (qwen3 embedding)
  dimensions: 4096  # actual dimension for qwen3-embedding (verified via API)
  # Ollama uses a local base_url and typically does not require an API key
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: ""  # not used for local Ollama
  base_url: "http://localhost:11434"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true  # Set to true to enable vision capabilities
  provider: "qwen"  # Options: openai, azure, ollama, qwen
  model: "qwen-image-max"
  # Azure-compatible settings (azure_endpoint triggers Azure compat mode):
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: "sk-43e9f700897049e1b57ab7e27d523ff6"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # Ollama-specific settings (if provider is ollama):
  # base_url: "http://localhost:11434"
  max_image_size: 2048  # Max dimension (width/height) for image compression

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Graph-RAG Configuration (Pluggable)
# =============================================================================
graph:
  enabled: false               # false keeps current behavior (Dense+Sparse hybrid)
  mode: "hybrid"              # Options: hybrid, graph, hybrid_graph
  top_k: 20                    # Candidate size for graph retrieval
  hops: 1                      # Graph expansion depth
  weight_in_fusion: 1.0        # Weight when mode=hybrid_graph

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "cross_encoder"  # Options: none, cross_encoder, llm
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 8
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: true  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement
  
  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: true  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment
